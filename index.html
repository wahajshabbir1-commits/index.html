<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            display: block;
            margin: 0 auto 15px auto; 
            max-width: 120px; 
            height: auto; 
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            margin-top: 0; 
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3; 
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #004494;
        }
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none; 
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <img src="coat-of-arms.png" alt="University Coat of Arms" class="logo">
    
    <h2>Student Portal</h2>
    
    <div id="loginContainer">
        <div class="form-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" name="studentId">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
        </div>
        
        <button type="button" onclick="attemptLogin()">Login</button>
        <div id="errorText" class="error-message">Please enter an ID and Password.</div>
    </div>
</div>

<script>
    function attemptLogin() {
        // .trim() removes any accidental spaces the user types
        const studentId = document.getElementById('studentId').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorText = document.getElementById('errorText');

        if (studentId === '22401429' && password === '30202030') {
            errorText.style.display = 'none';
            // THE FIX: Simple relative link directly to the dashboard
            window.location.href = 'dashboard.html'; 
        } else {
            errorText.textContent = 'Incorrect Student ID or Password.';
            errorText.style.display = 'block';
        }
    }

    // Allows hitting "Enter" on the keyboard to log in
    document.getElementById('studentId').addEventListener('keypress', function(e) { if(e.key === 'Enter') attemptLogin(); });
    document.getElementById('password').addEventListener('keypress', function(e) { if(e.key === 'Enter') attemptLogin(); });
</script>

</body>
</html>
