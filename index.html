<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <style>
        /* A very basic, clean layout */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        
        /* Coat of Arms Styling */
        .logo {
            display: block;
            margin: 0 auto 15px auto; /* Centers the image horizontally and adds space below */
            max-width: 120px; /* Adjust this number based on how big you want the logo */
            height: auto; /* Keeps the aspect ratio from stretching */
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            margin-top: 0; /* Keeps spacing clean below the logo */
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't mess up width */
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3; /* Generic blue */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #004494;
        }
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <img src="coat-of-arms.png" alt="University Coat of Arms" class="logo">
    
    <h2>Student Portal</h2>
    
<form id="mockLoginForm">
        <div class="form-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" name="studentId" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="button" onclick="attemptLogin()">Login</button>
        <div id="errorText" class="error-message">Please enter an ID and Password.</div>
    </form>
</div>

<script>
    function attemptLogin() {
        const studentId = document.getElementById('studentId').value;
        const password = document.getElementById('password').value;
        const errorText = document.getElementById('errorText');

        if (studentId === '22401429' && password === '30202030') {
            // Success! Hide error
            errorText.style.display = 'none';
            // THE FIX: Use the absolute URL so it is forced to leave the login page
            window.location.href = 'https://bilknet.it.com.com/dashboard.html'; 
        } else {
            // Failure! Show error
            errorText.textContent = 'Incorrect Student ID or Password.';
            errorText.style.display = 'block';
        }
    }

    // This makes it so hitting the "Enter" key on your keyboard also triggers the login
    document.getElementById('mockLoginForm').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            attemptLogin();
        }
    });
</script>

</body>
</html>
